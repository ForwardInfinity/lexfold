services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: lexfold
      POSTGRES_USER: lexfold
      POSTGRES_PASSWORD: lexfold
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexfold"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    volumes:
      - hfcache:/data/hf   # cache model BGE-M3 — không tải lại mỗi lần recreate container
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://lexfold:lexfold@postgres:5432/lexfold
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  ui-chat:
    build: .
    restart: unless-stopped
    command: streamlit run ui/chat_app.py --server.port 8501 --server.address 0.0.0.0
    env_file:
      - path: .env
        required: false
    environment:
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api

  ui-admin:
    build: .
    restart: unless-stopped
    command: streamlit run ui/admin_app.py --server.port 8502 --server.address 0.0.0.0
    env_file:
      - path: .env
        required: false
    environment:
      API_URL: http://api:8000
    ports:
      - "8502:8502"
    depends_on:
      - api

volumes:
  pgdata:
  hfcache:
