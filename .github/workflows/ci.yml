name: ci
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: lexfold
          POSTGRES_USER: lexfold
          POSTGRES_PASSWORD: lexfold
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lexfold"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://lexfold:lexfold@localhost:5432/lexfold
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/schema.sql
      - run: pip install -e . pytest ruff
      - run: ruff check .
      - run: pytest
